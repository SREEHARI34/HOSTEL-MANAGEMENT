<!DOCTYPE html>
<html>
<head>
<title>Student Data</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #1e1e2f;
    color: white;
    padding: 20px;
}

h2 {
    margin-bottom: 20px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #374151;
}

tr {
    background: #2a2a40;
}

tr:hover {
    background: #3b3b5c;
}

/* Back button */
.back-btn {
    margin-bottom: 15px;
    padding: 10px;
    background: orange;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<h2>Student Data 📄</h2>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Room</th>
    <th>Status</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

<script>

// Back button
function goBack() {
    window.location.href = "dashboard.html";
}

// Load students from localStorage
function loadData() {
    let data = JSON.parse(localStorage.getItem("students")) || [];
    let table = document.getElementById("tableData");

    table.innerHTML = "";

    if(data.length === 0) {
        table.innerHTML = "<tr><td colspan='3'>No Data Found</td></tr>";
        return;
    }

    data.forEach(s => {
        let row = `
        <tr>
            <td>${s.name}</td>
            <td>${s.room}</td>
            <td>${s.status}</td>
        </tr>`;
        table.innerHTML += row;
    });
}

loadData();

</script>

</body>
</html>
